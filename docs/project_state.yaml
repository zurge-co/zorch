summary: |
  Zorch proxies requests to OpenAI-compatible and Anthropic providers with
  encrypted key storage, retry logic, streaming, and model alias routing.
  The Rust backend provides a sandboxed Rhai middleware engine, per-key
  governance pipeline (RPM/RPD/budget/allowlist/access-windows), billing with
  latency breakdown, and admin REST API. The Next.js dashboard manages
  providers, API keys, models, pricing, middleware configs, and analytics.
  Completed: Rhai middleware with per-key binding, sticky target routing,
  model aliases, per-key governance, and PostgreSQL analytics.
  Missing: dynamic pricing from DB, gateway rejection persistence,
  ClickHouse analytics reads, response-phase middleware, real-time updates.

features:
  proxy:
    - id: provider-proxy
      description: Pass-through HTTP proxy to OpenAI-compatible and Anthropic upstreams
      status: complete
    - id: multi-key-rotation
      description: Encrypted multi-key rotation with AES-256-GCM at-rest and fallback
      status: complete
    - id: streaming-support
      description: Streaming proxy with SSE usage parsing for per-request billing
      status: complete
    - id: retry-logic
      description: Exponential-backoff retry with jitter for 429/5xx upstream errors
      status: complete
    - id: model-alias-routing
      description: Public model aliases with priority-based multi-target routing and equal-priority shuffling
      status: complete
    - id: sticky-target-routing
      description: Sticky client-key to provider-key routing with round-robin selection and configurable TTL
      status: complete
    - id: circuit-breaker
      description: In-memory circuit breaker per backend with Closed/Open/HalfOpen transitions
      status: complete
    - id: middleware-engine
      description: Sandboxed Rhai scripting middleware engine with per-key binding, configurable limits, and audit logging
      status: complete
    - id: middleware-request-phases
      description: request.pre_governance and request.pre_upstream phases
      status: complete
    - id: middleware-response-phases
      description: response.pre_client and inspector.pre_capture phases
      status: missing
    - id: access-windows
      description: Per-key time-of-day access restrictions with IANA timezone support
      status: complete
    - id: per-key-rate-limit
      description: Per-key RPM/RPD rate limiting via Redis sliding windows
      status: complete
    - id: per-key-budget
      description: Per-key daily spend budget enforcement
      status: complete
    - id: per-key-model-allowlist
      description: Per-key allowed model list enforcement
      status: complete
    - id: billing-latency-breakdown
      description: Provider and gateway latency breakdown in billing records
      status: complete

  admin_dashboard:
    - id: api-key-crud
      description: API key CRUD with tags, access windows, governance limits, middleware binding, expiration, and scopes
      status: complete
    - id: provider-crud
      description: Provider CRUD with target models, encrypted API key management, active toggle, and model preview
      status: complete
    - id: model-alias-crud
      description: Model alias CRUD with priority-based target management
      status: complete
    - id: pricing-crud
      description: Per-model pricing upsert with markup and max-context config
      status: complete
    - id: middleware-admin
      description: Middleware config CRUD with Monaco editor, script validation, dry-run, and execution logs
      status: complete
    - id: middleware-per-key-binding
      description: Per-API-key middleware config assignment via dashboard and admin API
      status: complete
    - id: analytics-charts
      description: Token usage, cost trends, latency percentiles, and tag attribution charts
      status: complete
    - id: dashboard-metrics
      description: Dashboard with RPM, TPM, error rate, and recent activity feed
      status: complete
    - id: gateway-config-view
      description: Settings page displaying gateway configuration
      status: complete
    - id: real-time-updates
      description: Live WebSocket or SSE updates for dashboard and analytics
      status: missing

  analytics:
    - id: postgres-billing-log
      description: PostgreSQL requests_log for billing, auditing, and analytics queries
      status: complete
    - id: clickhouse-inspector
      description: ClickHouse inspector for request metadata capture and health checks
      status: partial
    - id: prometheus-metrics
      description: Prometheus-compatible /metrics endpoint for operational telemetry
      status: complete
    - id: cost-attribution-by-tag
      description: Tag-level cost and usage attribution in analytics
      status: complete

  security:
    - id: key-encryption
      description: AES-256-GCM encryption for provider API keys at rest
      status: complete
    - id: client-key-hashing
      description: SHA-256 hashing for client API key authentication
      status: complete
    - id: admin-auth
      description: Admin secret header and scoped bearer token authentication
      status: complete
    - id: constant-time-eq
      description: Constant-time comparison for admin secret verification
      status: complete

next_recommended:
  - id: dynamic-pricing-engine
    description: Load provider_model_config from DB instead of hardcoded seed models in PricingEngine
    priority: high
  - id: persist-gateway-rejections
    description: Write BillingRecord for rate-limit/budget/governance/circuit-breaker blocks so they appear in analytics
    priority: high
  - id: add-integration-tests
    description: Create Rust HTTP-level E2E tests for proxy and admin endpoints; smoke test scripts exist but no integration tests
    priority: high
  - id: wire-response-middleware
    description: Implement response.pre_client and inspector.pre_capture phases; enum variants were removed and need re-adding with proxy_handler invocation
    priority: medium
  - id: clickhouse-analytics-read
    description: Add admin endpoints that query ClickHouse for analytics and fix schema mismatch (missing middleware_metadata column)
    priority: medium

